<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Vendedor - SafePix</title>
    <style>
        /* CONFIGURAÇÕES DE DESIGN SYSTEM (UX/UI) */
        :root {
            --cor-fundo-tela: #e9ecef;
            --cor-card: #f8f9fa;
            --cor-primaria: #00bfa5; /* Verde Safepix */
            --cor-texto-escuro: #333333;
            --cor-texto-mutado: #666666;
            --cor-borda: #cccccc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--cor-fundo-tela);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* CONTAINER MOBILE-FIRST CENTRALIZADO */
        .wrapper-celular {
            width: 100%;
            max-width: 430px; /* Simula tela de smartphone */
            background-color: var(--cor-card);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            border: 4px solid #222; /* Moldura simulando o celular da foto */
            display: flex;
            flex-direction: column;
        }

        /* DETALHE VERDE NO TOPO */
        .detalhe-topo {
            height: 8px;
            background-color: var(--cor-primaria);
            width: 100%;
        }

        /* CONTEÚDO INTERNO */
        .conteudo {
            padding: 25px;
            flex-grow: 1;
        }

        h1 {
            font-size: 1.15rem;
            color: var(--cor-texto-escuro);
            font-weight: 700;
            margin-bottom: 12px;
        }

        .descricao {
            font-size: 0.85rem;
            color: var(--cor-texto-mutado);
            line-height: 1.4;
            margin-bottom: 25px;
        }

        /* FORMULÁRIO */
        .campo-grupo {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--cor-texto-escuro);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--cor-borda);
            border-radius: 8px;
            font-size: 0.95rem;
            color: var(--cor-texto-escuro);
            background-color: #ffffff;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--cor-primaria);
        }

        /* ÁREA DO BOTÃO (FIXADO EMBAIXO COMO NA FOTO) */
        .area-acao {
            padding: 20px 25px 25px 25px;
            background-color: var(--cor-card);
        }

        .btn-gerar {
            width: 100%;
            background-color: var(--cor-primaria);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-gerar:hover {
            background-color: #00a68f;
        }

        .btn-gerar:active {
            transform: scale(0.98);
        }

        /* AREA DO LINK GERADO */
        .resultado-link {
            margin-top: 15px;
            padding: 12px;
            background-color: #e0f2f1;
            border: 1px dashed var(--cor-primaria);
            border-radius: 8px;
            font-size: 0.85rem;
            word-break: break-all;
            text-align: center;
            display: none;
        }
        .resultado-link a {
            color: #00796b;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="wrapper-celular">
        <div class="detalhe-topo"></div>

        <div class="conteudo">
            <h1>Área do Vendedor</h1>
            <p class="descricao">
                Crie uma cobrança segura. O dinheiro do comprador ficará retido até que ele receba e teste o produto.
            </p>

            <form id="form-safepix" onsubmit="gerarLink(event)">
                <div class="campo-grupo">
                    <label for="produto">O que você está vendendo?</label>
                    <input type="text" id="produto" placeholder="Ex: iPhone 12 Usado" required>
                </div>

                <div class="campo-grupo">
                    <label for="valor">Valor (R$)</label>
                    <input type="number" id="valor" step="0.01" placeholder="Ex: 2500,00" required>
                </div>
                
                <div id="box-resultado" class="resultado-link">
                    <span>Link criado com sucesso! <br></span>
                    <a id="link-gerado" href="#" target="_blank"></a>
                </div>
            </form>
        </div>

        <div class="area-acao">
            <button type="submit" form="form-safepix" class="btn-gerar">Gerar Link SafePix</button>
        </div>
    </div>

    <script>
        function gerarLink(event) {
            // Evita que a página recarregue ao submeter o formulário
            event.preventDefault();

            // Pega os valores digitados pelo usuário
            const produto = document.getElementById('produto').value;
            const valor = document.getElementById('valor').value;

            // Formata o nome do produto para a URL (remove espaços e poe hifen)
            const produtoUrl = encodeURIComponent(produto.toLowerCase().replace(/ /g, "-"));
            
            // Simula a criação de um link dinâmico da SPA
            const linkFinal = `https://gabrielazevedosoares-ai.github.io/mvp-safepix/pagamento.html?item=${produtoUrl}&preco=${valor}`;

            // Exibe a caixinha com o link na tela
            const boxResultado = document.getElementById('box-resultado');
            const linkElemento = document.getElementById('link-generated' || 'link-gerado');
            
            linkElemento.href = linkFinal;
            linkElemento.innerText = linkFinal;
            boxResultado.style.display = 'block';

            // Alerta visual de sucesso para o usuário
            alert(`Link gerado para: ${produto} por R$ ${valor}! Copie o link gerado na tela.`);
        }
    </script>
</body>
</html>
